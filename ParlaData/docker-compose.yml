services:
  mysql:
    image: mysql:8.0
    container_name: parla-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: parla123
      MYSQL_DATABASE: parladb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    image: aleffigueiredo/parladata-backend:v1
    container_name: parla-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: aleffigueiredo/parladata-frontend:v1
    container_name: parla-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql-data: