services:
  mysql:
    image: mysql:8.0
    container_name: parla-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: parla123
      MYSQL_DATABASE: parladb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: aleffigueiredo/parladata-backend:v1
    container_name: parla-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: parla123
      DB_NAME: parladb
      DB_PORT: 3306
    ports:
      - "3000:3000"

  frontend:
    image: aleffigueiredo/parladata-frontend:v1
    container_name: parla-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"